<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Posture Check for macOS</title>
    <meta
      name="description"
      content="Posture Check is a simple macOS app that reminds you to check your posture."
    >
    <meta name="theme-color" content="#eef7f1">
    <meta property="og:title" content="Posture Check for macOS">
    <meta
      property="og:description"
      content="A simple macOS app for scheduled posture reminders."
    >
    <meta property="og:type" content="website">
    <meta property="og:image" content="./assets/site/app-icon.png">
    <link rel="icon" type="image/png" href="./assets/site/favicon.png">
    <link rel="apple-touch-icon" href="./assets/site/apple-touch-icon.png">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <div class="icon-frame">
          <img
            class="app-icon"
            src="./assets/site/app-icon.png"
            alt="Posture Check app icon"
            width="240"
            height="240"
          >
        </div>

        <div class="content">
          <h1>Posture Check</h1>
          <p class="tagline">Simple scheduled posture reminders for macOS.</p>

          <div class="actions">
            <a
              class="button"
              id="download-link"
              href="https://github.com/rubybear-lgtm/posture-check/releases/latest/download/PostureCheck-macOS.zip"
            >
              Download for macOS
            </a>
          </div>

          <p class="meta">macOS 14+ • Notifications required</p>
          <p class="download-note" id="download-note">
            Unsigned build. If macOS blocks it, right-click the app and choose Open.
          </p>
        </div>
      </section>
    </main>

    <script src="./site-config.js"></script>
  </body>
</html>

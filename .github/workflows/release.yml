name: Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build unsigned DMG
        id: package
        run: ./scripts/release_dmg.sh

      - name: Publish release assets
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          DMG_PATH="${{ steps.package.outputs.dmg_path }}"
          CHECKSUM_PATH="${{ steps.package.outputs.checksum_path }}"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$DMG_PATH" "$CHECKSUM_PATH" --clobber
          else
            gh release create "$RELEASE_TAG" "$DMG_PATH" "$CHECKSUM_PATH" \
              --title "Posture Check ${RELEASE_TAG#v}" \
              --notes "Unsigned DMG release. macOS may require you to right-click the app and choose Open the first time."
          fi
